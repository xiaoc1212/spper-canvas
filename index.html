<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>四象限冒险任务盘</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-panel">
        <div>
          <p class="eyebrow">QUEST BOARD · 四象限</p>
          <h1>四象限冒险任务盘</h1>
          <p class="subtitle">把任务放进四个区域，展开子任务，像打怪一样一点点清掉。</p>
        </div>
        <div class="hud">
          <div><span id="coinCount">0</span><small>金币</small></div>
          <div><span id="doneCount">0</span><small>完成</small></div>
          <div><span id="dueCount">0</span><small>提醒</small></div>
        </div>
      </header>

      <main class="layout">
        <section class="forge-card">
          <h2>🛠️ 新建任务</h2>
          <form id="taskForm">
            <label>任务名<input name="title" required placeholder="例如：完成作品集首页" /></label>
            <label>说明<textarea name="description" placeholder="简单写一下目标"></textarea></label>
            <div class="switch-row">
              <label class="toggle"><input name="important" type="checkbox" checked />重要</label>
              <label class="toggle"><input name="urgent" type="checkbox" />紧急</label>
            </div>
            <div class="two-col">
              <label>优先级
                <select name="priority">
                  <option value="S">S · Boss级</option>
                  <option value="A" selected>A · 主线</option>
                  <option value="B">B · 支线</option>
                  <option value="C">C · 小怪</option>
                </select>
              </label>
              <label>提醒时间<input name="reminderAt" type="datetime-local" /></label>
            </div>
            <label>子任务（一行一个）<textarea name="subtasksText" placeholder="找参考\n搭结构\n导出预览"></textarea></label>
            <button class="primary-btn" type="submit">＋ 收进任务盘</button>
          </form>
        </section>

        <section class="board" id="board" aria-live="polite"></section>
      </main>
    </div>

    <template id="quadrantTemplate">
      <article class="quadrant">
        <div class="quadrant-title"><span class="q-icon"></span><div><h2></h2><p></p></div></div>
        <div class="task-list"></div>
      </article>
    </template>

    <template id="taskTemplate">
      <article class="task-card">
        <button class="task-main" type="button">
          <div class="task-top"><strong></strong><span class="priority"></span></div>
          <p class="desc"></p>
          <div class="progress"><span></span></div>
          <div class="meta"></div>
        </button>
        <div class="task-detail"></div>
      </article>
    </template>

    <div id="toast" class="toast" role="status"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
